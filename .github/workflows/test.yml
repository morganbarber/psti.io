name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-js:
    name: Run Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JS/TS Tests
        run: npm run test

  test-python:
    name: Run Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies and test
        run: |
          cd packages/python-sdk
          pip install -e ".[dev]"
          pytest
